<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Game List</title>
</head>
<body>

<a href="/games/add">Add</a>

<table border="1">
    <tr>
        <th>STT</th>
        <th>Title</th>
        <th>Genre</th>
        <th>Quantity</th>
        <th>Image</th>
        <th>Action</th>
    </tr>

    <tr th:each="g, i : ${games}">
        <td th:text="${i.index + 1}"></td>
        <td th:text="${g.title}"></td>
        <td th:text="${g.genre}"></td>
        <td th:text="${g.quantity}"></td>
        <td>
            <img th:src="${g.coverImage}" width="80"/>
        </td>
        <td>
            <a th:href="@{/games/edit/{id}(id=${g.id})}">Edit</a>
            <a th:href="@{/games/delete/{id}(id=${g.id})}"
               onclick="return confirm('Delete?')">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
